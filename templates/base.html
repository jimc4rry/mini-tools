<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Minitools Hub{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1216;
      --surface: #171b21;
      --border: #262c35;
      --text: #e7eaee;
      --muted: #9aa4b2;
      --accent: #4f8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header nav a { margin-left: 1.25rem; color: var(--text); font-weight: 500; }
    header .brand { font-weight: 700; font-size: 1.1rem; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .muted { color: var(--muted); }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 1rem;
    }
    .docs-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2rem;
      align-items: start;
    }
    .docs-sidebar { position: sticky; top: 1rem; }
    .docs-sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .docs-sidebar ul { list-style: none; margin: 0; padding: 0; }
    .docs-sidebar li { margin-bottom: 0.5rem; }
    .docs-sidebar a { color: var(--muted); }
    .docs-sidebar a.active { color: var(--text); font-weight: 600; }
    @media (max-width: 700px) {
      .docs-layout { grid-template-columns: 1fr; }
      .docs-sidebar { position: static; }
    }
    main.wide { max-width: 1200px; }

    .tools-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 2rem;
      align-items: start;
    }
    .tools-sidebar { position: sticky; top: 1rem; }
    .tools-sidebar ul { list-style: none; margin: 0; padding: 0; }
    .tools-sidebar li { margin-bottom: 0.2rem; }
    .tools-sidebar a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .tools-sidebar a:hover { background: var(--surface); text-decoration: none; }
    .tools-sidebar a.active { background: var(--accent); color: #fff; font-weight: 600; }
    .tools-sidebar .cat-icon { font-size: 1rem; width: 1.2em; text-align: center; }

    .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.25rem; }
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .tool-card-link { color: inherit; text-decoration: none; display: flex; flex-direction: column; height: 100%; }
    .tool-thumb {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--surface) 130%);
    }
    .tool-card-body { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .tool-card-title { font-weight: 600; }
    .tool-card-desc { color: var(--muted); font-size: 0.85rem; margin: 0; }
    @media (max-width: 700px) {
      .tools-layout { grid-template-columns: 1fr; }
      .tools-sidebar { position: static; overflow-x: auto; }
      .tools-sidebar ul { display: flex; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{% url 'core:home' %}">Minitools Hub</a>
    <nav>
      <a href="{% url 'docs:list' %}">Documents</a>
      <a href="{% url 'tools:list' %}">Tools</a>
    </nav>
  </header>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <footer>&copy; {% now "Y" %} Minitools Hub</footer>
</body>
</html>
