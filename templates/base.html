<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Minitools Hub{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1216;
      --surface: #171b21;
      --border: #262c35;
      --text: #e7eaee;
      --muted: #9aa4b2;
      --accent: #4f8cff;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header nav a { margin-left: 1.25rem; color: var(--text); font-weight: 500; }
    header .brand { font-weight: 700; font-size: 1.1rem; }

    .shell { flex: 1; display: flex; align-items: stretch; }
    .site-rail {
      flex: 0 0 220px;
      width: 220px;
      border-right: 1px solid var(--border);
      padding: 1.5rem 1.25rem;
      position: sticky;
      top: 0;
      align-self: flex-start;
    }
    .site-rail h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .site-rail ul { list-style: none; margin: 0; padding: 0; }
    .site-rail li { margin-bottom: 0.2rem; }
    .site-rail a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.6rem;
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    .site-rail a:hover { background: var(--surface); text-decoration: none; }
    .site-rail a.active { background: var(--accent); color: #fff; font-weight: 600; }
    .site-rail .cat-icon { font-size: 1rem; width: 1.2em; text-align: center; }
    .site-rail:empty { display: none; }

    main { flex: 1; min-width: 0; }
    main .page { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    main.wide .page { max-width: 1200px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .muted { color: var(--muted); }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2rem 1rem;
    }

    .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1.25rem; }
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .tool-card-link { color: inherit; text-decoration: none; display: flex; flex-direction: column; height: 100%; }
    .tool-thumb {
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      background: linear-gradient(135deg, var(--accent) 0%, var(--surface) 130%);
    }
    .tool-card-body { padding: 1rem 1.1rem 1.2rem; flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .tool-card-title { font-weight: 600; }
    .tool-card-desc { color: var(--muted); font-size: 0.85rem; margin: 0; }

    @media (max-width: 700px) {
      .shell { flex-direction: column; }
      .site-rail {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }
      .site-rail ul { display: flex; gap: 0.5rem; }
      .site-rail li { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="{% url 'core:home' %}">Minitools Hub</a>
    <nav>
      <a href="{% url 'docs:list' %}">Documents</a>
      <a href="{% url 'tools:list' %}">Tools</a>
    </nav>
  </header>
  <div class="shell">
    <aside class="site-rail">{% block sidebar %}{% endblock %}</aside>
    <main class="{% block main_class %}{% endblock %}">
      <div class="page">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
  <footer>&copy; {% now "Y" %} Minitools Hub</footer>
</body>
</html>
