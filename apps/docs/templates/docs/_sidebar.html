{% load i18n %}
<h3>{% trans "Applications" %}</h3>
<ul>
  {% for project in all_projects %}
    <li>
      <a href="{{ project.get_absolute_url }}"{% if project == current_project %} class="active"{% endif %}>
        {{ project.name }}
      </a>
    </li>
  {% empty %}
    <li class="muted">{% trans "No applications yet." %}</li>
  {% endfor %}
</ul>
