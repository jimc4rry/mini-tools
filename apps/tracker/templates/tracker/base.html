<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Expiration Tracker{% endblock %}</title>
<style>
  :root {
    --ok: #2e7d32; --warning: #f9a825; --critical: #e65100; --expired: #c62828;
    --bg: #f7f7f5; --card: #ffffff; --border: #e2e2df; --text: #222; --muted: #6b6b6b;
    --primary: #2f6f4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg); color: var(--text);
  }
  nav {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 24px; background: var(--primary); color: white;
  }
  nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
  nav .brand { font-weight: 700; font-size: 18px; margin: 0; }
  main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    padding: 20px; margin-bottom: 16px;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 12px; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px;
    font-weight: 600; color: white;
  }
  .badge.ok { background: var(--ok); }
  .badge.warning { background: var(--warning); color: #3a2c00; }
  .badge.critical { background: var(--critical); }
  .badge.expired { background: var(--expired); }
  .row.critical, .row.expired { background: #fff5f0; }
  .row.warning { background: #fffbea; }
  .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 120px; text-align: center; padding: 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); }
  .stat a { text-decoration: none; color: inherit; display:block; }
  .stat .n { font-size: 26px; font-weight: 700; }
  .stat .l { font-size: 12px; color: var(--muted); text-transform: uppercase; }
  form { display: flex; flex-direction: column; gap: 4px; max-width: 560px; }
  .field {
    display: grid; grid-template-columns: 180px 1fr; column-gap: 20px; row-gap: 4px;
    align-items: start; padding: 8px 0;
  }
  .field:not(:last-of-type) { border-bottom: 1px solid #f0f0ee; }
  .field label {
    text-align: right; padding-top: 9px; font-size: 13px; font-weight: 600; color: var(--muted);
  }
  .field-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .field-actions { padding-top: 8px; }
  input, select, textarea {
    width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(47, 111, 79, 0.12);
  }
  .field-error { color: var(--expired); font-size: 12px; }
  @media (max-width: 620px) {
    .field { grid-template-columns: 1fr; row-gap: 6px; }
    .field label { text-align: left; padding-top: 0; }
  }
  .btn {
    display: inline-block; background: var(--primary); color: white; border: none;
    padding: 9px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none;
  }
  .btn.secondary { background: #999; }
  .btn.danger { background: var(--expired); }
  .actions a, .actions button { margin-right: 8px; font-size: 13px; }
  .messages { list-style: none; padding: 0; }
  .messages li { padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; background: #e8f5e9; color: #1b5e20; font-size: 14px; }
  .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .empty { color: var(--muted); padding: 24px; text-align: center; }
  .helptext { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<nav>
  <p class="brand">📦 Expiration Tracker</p>
  <div>
    {% if user.is_authenticated %}
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'category_list' %}">Κατηγορίες</a>
      <a href="{% url 'waste_log' %}">Φύρα</a>
      <a href="{% url 'settings' %}">Ρυθμίσεις</a>
      <form method="post" action="{% url 'logout' %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" style="background:none;border:none;color:white;cursor:pointer;font-size:14px;">Αποσύνδεση</button>
      </form>
    {% else %}
      <a href="{% url 'login' %}">Σύνδεση</a>
      <a href="{% url 'signup' %}">Εγγραφή</a>
    {% endif %}
  </div>
</nav>
<main>
  {% if messages %}
    <ul class="messages">
      {% for message in messages %}<li>{{ message }}</li>{% endfor %}
    </ul>
  {% endif %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
