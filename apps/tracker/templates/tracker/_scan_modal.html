{% load i18n static %}
<div id="scan-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;">
  <div class="card" style="width:min(420px, 92vw);">
    <div class="top-row" style="margin-bottom:0.75rem;">
      <h3 style="margin:0;">{% trans "Scan barcode" %}</h3>
      <button type="button" class="btn-secondary" id="scan-close-btn">{% trans "Close" %}</button>
    </div>
    <div id="qr-reader" style="width:100%;"></div>
    <p class="muted" id="scan-status" style="margin-top:0.5rem;font-size:0.85rem;"></p>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="{% static 'tracker/barcode-scanner.js' %}"></script>
